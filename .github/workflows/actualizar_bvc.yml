name: Actualizar Datos BVC Automáticamente

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar Repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar Dependencias
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests yfinance

      - name: Ejecutar Descargador BVC
        run: python descargador_cascada.py

      - name: Guardar y Enviar Cambios al Repositorio
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add datos_bvc/
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-actualización de datos BVC por GitHub Actions" && git push)
